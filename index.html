<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top One Limousine | توب وان ليموزين</title>
    <style>
        :root { --gold: #f39c12; --dark: #111; --grey: #222; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; }
        
        /* البرومو العلوي */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://cdn.pixabay.com/photo/2016/11/22/23/44/porsche-1851246_1280.jpg');
            background-size: cover; background-position: center; height: 50vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        .hero h1 { font-size: 3rem; color: var(--gold); margin: 0; }

        .container { max-width: 1100px; margin: -40px auto 50px; padding: 0 20px; }

        /* كارت الحجز */
        .card { background: var(--grey); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 40px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #333; color: white; box-sizing: border-box; }
        .btn-booking { grid-column: 1 / -1; padding: 15px; background: #25d366; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 10px; }

        /* قسم الخريطة والـ GPS */
        .location-section { background: var(--grey); padding: 25px; border-radius: 15px; text-align: center; }
        .location-section h2 { color: var(--gold); margin-top: 0; }
        .map-container { width: 100%; height: 300px; border-radius: 10px; overflow: hidden; margin: 20px 0; border: 2px solid var(--gold); }
        .btn-gps { display: inline-block; padding: 12px 25px; background: var(--gold); color: black; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-gps:hover { background: white; transform: scale(1.05); }

        footer { text-align: center; padding: 30px; color: #666; }
    </style>
</head>
<body>

<section class="hero">
    <h1>Top One Limousine</h1>
    <p>رفاهية التنقل بين يديك</p>
</section>

<div class="container">
    <div class="card">
        <h2 style="text-align:center; color:var(--gold);">احجز رحلتك الآن</h2>
        <div class="form-grid">
            <input type="text" placeholder="الاسم">
            <input type="text" placeholder="رقم الموبايل">
            <select><option>نوع السيارة</option><option>سيدان</option><option>SUV</option></select>
            <input type="date">
            <input type="text" placeholder="الوجهة" style="grid-column: 1 / -1;">
            <button class="btn-booking" onclick="sendBooking()">ارسل الطلب عبر واتساب 💬</button>
        </div>
    </div>

    <div class="location-section">
        <h2>موقعنا على الخريطة</h2>
        <p>تشرفنا بزيارتك في مقر الشركة</p>
        
        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d110502.603895232!2d31.188423!3d30.059469!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14583fa60b21beeb%3A0x79dfb2963c1f59e!2sCairo%2C%20Egypt!5e0!3m2!1sen!2s!4v1700000000000!5m2!1sen!2s" 
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>

        <a href="https://www.google.com/maps/dir/?api=1&destination=Cairo,Egypt" target="_blank" class="btn-gps">
             فتح الموقع في الـ GPS (خرائط جوجل) 📍
        </a>
    </div>
</div>

<footer>&copy; 2026 Top One Limousine</footer>

<script>
function sendBooking() {
    let i = document.querySelectorAll("input");
    let msg = `طلب حجز 🚕%0Aالاسم: ${i[0].value}%0Aالهاتف: ${i[1].value}%0Aالوجهة: ${i[3].value}`;
    window.open("https://wa.me/201092335265?text=" + msg, "_blank");
}
</script>

</body>
</html>
