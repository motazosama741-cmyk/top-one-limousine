<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top One Limousine | توب وان ليموزين</title>
    <style>
        :root { --gold: #f39c12; --glass: rgba(0, 0, 0, 0.85); }
        
        /* رجعنا التصميم الداكن الفخم */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow-x: hidden; background-color: #000; 
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        /* كود الفيديو المضمون بنسبة 100% */
        .video-bg { 
            position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; z-index: -1; 
            object-fit: cover; filter: brightness(35%); 
        }

        .overlay { position: relative; z-index: 1; padding: 20px; text-align: center; }
        
        header h1 { 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            color: var(--gold); margin-top: 60px; 
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8); 
        }
        header p { font-size: 1.2rem; margin-bottom: 40px; opacity: 0.9; }

        /* الكارت اللي كان عاجبك في الأول */
        .booking-card { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            padding: 35px; border-radius: 25px; 
            border: 1px solid rgba(243, 156, 18, 0.3); 
            max-width: 500px; margin: 0 auto; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); 
        }

        .input-group { margin-bottom: 15px; text-align: right; }
        input, select { 
            width: 100%; padding: 15px; border-radius: 12px; 
            border: 1px solid #444; background: rgba(255,255,255,0.08); 
            color: white; font-size: 16px; box-sizing: border-box;
        }
        
        .btn-wa { 
            width: 100%; padding: 18px; background: #25d366; 
            color: white; border: none; border-radius: 12px; 
            cursor: pointer; font-size: 20px; font-weight: bold; 
            transition: 0.3s; margin-top: 10px; 
        }
        .btn-wa:hover { background: #1ebd5b; transform: translateY(-3px); }

    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-night-time-city-traffic-4045-large.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <header>
            <h1>Top One Limousine</h1>
            <p>أفخم خدمة ليموزين في مصر.. رفاهية تليق بك</p>
        </header>

        <div class="booking-card">
            <h2 style="color:var(--gold); margin-bottom: 25px;">احجز رحلتك الآن</h2>
            
            <div class="input-group">
                <input type="text" id="name" placeholder="الاسم بالكامل">
            </div>
            <div class="input-group">
                <input type="text" id="phone" placeholder="رقم الهاتف">
            </div>
            <div class="input-group">
                <select id="car">
                    <option value="">اختر السيارة</option>
                    <option>مرسيدس E200</option>
                    <option>تويوتا لاند كروزر (SUV)</option>
                    <option>تويوتا هايس (عائلي)</option>
                </select>
            </div>
            <div class="input-group">
                <input type="text" id="destination" placeholder="وجهة التوصيل">
            </div>
            
            <button class="btn-wa" onclick="sendToWhatsApp()">احجز عبر واتساب 💬</button>
        </div>
    </div>

    <script>
        function sendToWhatsApp() {
            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const car = document.getElementById("car").value;
            const destination = document.getElementById("destination").value;

            if(!name || !phone) {
                alert("يرجى إدخال الاسم ورقم الهاتف");
                return;
            }

            const message = `✨ طلب حجز جديد ✨%0A👤 الاسم: ${name}%0A📞 الهاتف: ${phone}%0A🚗 السيارة: ${car}%0A📍 الوجهة: ${destination}`;
            const whatsappURL = `https://wa.me/201092335265?text=${message}`;
            
            window.open(whatsappURL, "_blank");
        }
    </script>
</body>
</html>
